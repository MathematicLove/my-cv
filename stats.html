<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=3">
    <style>
        .stats-container {
            max-width: 800px;
            margin: 3em auto;
            padding: 2em 1em;
        }

        .stat-card {
            background: var(--body-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1.25em 1.5em;
            margin-bottom: 1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .stat-label {
            font-size: 1.1rem;
            color: var(--heading-color);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--link-color);
        }

        .refresh-btn {
            margin-top: 2em;
            padding: 10px 20px;
            font-size: 1rem;
        }

        .stats-title {
            text-align: center;
            margin-bottom: 2em;
            font-size: 1.8rem;
        }

        .stats-group {
            margin: 1.5em 0 0.75em;
            font-size: 1.15rem;
            color: var(--heading-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.35em;
        }
    </style>
</head>

<body>
    <div class="stats-container">
        <h1 class="stats-title">Статистика сайта</h1>
        <div id="stats"></div>
        <button onclick="loadStats()" class="btn btn--resume refresh-btn">Обновить данные</button>
    </div>

    <script>
        async function getCount(key) {
            try {
                console.log('API:', key);
                const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
                const data = await res.json();
                console.log('API', key, ':', data.value);
                return data.value || 0;
            } catch (e) {
                console.error('Error', key);
                return 0;           
            }
        }

        async function loadStats() {
            const container = document.getElementById('stats');
            container.innerHTML = '<p style="text-align:center">Загрузка...</p>';

            const groups = {
                'Общее': {
                    'mathematiclove-cv-site-views': 'Главная страница'
                },
                'Профили': {
                    'mathematiclove-cv-github-clicks': 'GitHub',
                    'mathematiclove-cv-orcid-clicks': 'ORCID',
                    'mathematiclove-cv-researchgate-clicks': 'ResearchGate',
                    'mathematiclove-cv-elibrary-clicks': 'eLibrary',
                    'mathematiclove-cv-huggingface-clicks': 'Hugging Face'
                },
                'Статьи': {
                    'mathematiclove-cv-article-tram-clicks': 'Статья «RoI на основе сегментации»',
                    'mathematiclove-cv-article-offside-clicks': 'Статья «CV для офсайда в футболе»'
                },
                'Проекты — ML и AI': {
                    'mathematiclove-cv-project-dynamic-roi-clicks': 'Object Detection on Dynamic RoI',
                    'mathematiclove-cv-project-hand-tracking-clicks': 'Hand Tracking Drawing',
                    'mathematiclove-cv-project-fashion-recommender-clicks': 'Vision Fashion Recommender',
                    'mathematiclove-cv-project-heart-disease-clicks': 'Heart Disease Classifier',
                    'mathematiclove-cv-project-qt-mnist-clicks': 'Qt MNIST recognizer',
                    'mathematiclove-cv-project-fashion-mnist-clicks': 'Fashion-MNIST (TinyVGG)',
                    'mathematiclove-cv-project-sarcasm-clicks': 'Sarcasmic Text Classification',
                    'mathematiclove-cv-project-leafs-health-clicks': 'Leafs Health Classification',
                    'mathematiclove-cv-project-animal-classification-clicks': 'Animal Classification (CNN)',
                    'mathematiclove-cv-project-breast-cancer-clicks': 'Breast Cancer Classification'
                },
                'Проекты — Web': {
                    'mathematiclove-cv-project-encrypt-it-clicks': 'Data Encryption and Decryption',
                    'mathematiclove-cv-project-quotes-clicks': 'Quotes from Movies and Cartoons'
                },
                'Проекты — Soft': {
                    'mathematiclove-cv-project-game-of-life-clicks': 'Game of Life on CA',
                    'mathematiclove-cv-project-ayzeks-sound-clicks': 'AyzeksSound (MP3 Player iOS)',
                    'mathematiclove-cv-project-price-checker-clicks': 'PriceCheckerBot',
                    'mathematiclove-cv-project-trip-planner-clicks': 'SpringTripPlannerBot',
                    'mathematiclove-cv-project-http-server-clicks': 'HTTP Server on Java',
                    'mathematiclove-cv-project-card-management-clicks': 'Card Management Service'
                },
                'Проекты — Math': {
                    'mathematiclove-cv-project-mathlang-clicks': 'MathLang Presentations',
                    'mathematiclove-cv-project-demographic-clicks': 'Demographic Regression (RU/JP)',
                    'mathematiclove-cv-project-regression-gas-clicks': 'Regression: Gas Export Impact',
                    'mathematiclove-cv-project-educational-clicks': 'Educational Projects'
                }
            };

            let html = '';
            for (const [group, stats] of Object.entries(groups)) {
                html += `<h2 class="stats-group">${group}</h2>`;
                const entries = Object.entries(stats);
                const values = await Promise.all(entries.map(([key]) => getCount(key)));
                entries.forEach(([, label], i) => {
                    html += `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${values[i]}</div></div>`;
                });
            }
            container.innerHTML = html;
        }

        window.onload = loadStats;
    </script>
</body>

</html>
